# Nginx reverse proxy for ParcelMoover, forwarding to the app container
# bound to 127.0.0.1:3000 (see deploy/docker-compose.prod.yml).
#
# This starts as plain HTTP on purpose: `certbot --nginx -d ... --redirect`
# detects this server block, obtains the cert, and rewrites this file in
# place to add the 443/SSL block plus the 80->443 redirect, carrying these
# same locations over. Don't hand-add an SSL server block before that —
# nginx refuses to start pointing at certificate files that don't exist yet.

server {
    listen 80;
    listen [::]:80;
    server_name 51-21-199-242.sslip.io;

    client_max_body_size 10m;

    # Long-lived Server-Sent-Events stream (server/src/controllers/notification.controller.ts).
    # Buffering here would hold every event in an Nginx buffer instead of
    # flushing it to the client immediately, defeating the point of SSE.
    location /api/notifications/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
