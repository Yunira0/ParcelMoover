# Nginx reverse proxy for ParcelMoover — terminates TLS, forwards to the app
# container bound to 127.0.0.1:3000 (see deploy/docker-compose.prod.yml).
#
# Install: copy to /etc/nginx/sites-available/parcelmoover.conf, symlink into
# sites-enabled, then run certbot (see deploy/ec2-setup.sh) to fill in the
# ssl_certificate lines below.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN_HERE;

    # certbot --nginx fills these in automatically; left here as placeholders
    # so the file is valid before certbot runs the first time.
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # Long-lived Server-Sent-Events stream (server/src/controllers/notification.controller.ts).
    # Buffering here would hold every event in an Nginx buffer instead of
    # flushing it to the client immediately, defeating the point of SSE.
    location /api/notifications/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Needed for cookie-based auth (server/src/middlewares/auth.middleware.ts)
        # to see the original client IP/proto once TRUST_PROXY is enabled.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
