name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}        # lets you trigger manually from the Actions tab

concurrency:
  group: production-deploy     # never run two deploys at once
  cancel-in-progress: false    # let a running deploy finish, queue the next

jobs:
  # ── Stage 1: prove the code builds & tests pass before building the image ──
  ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parcelmoover
          POSTGRES_PASSWORD: parcelmoover
          POSTGRES_DB: parcelmoover_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U parcelmoover"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build server (prisma generate + tsc)
        working-directory: server
        env:
          # prisma.config.ts reads DATABASE_URL at config-load even for
          # generate, which never connects — placeholder is fine
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run build

      - name: Apply migrations to the test database
        working-directory: server
        env:
          DATABASE_URL: postgresql://parcelmoover:parcelmoover@localhost:5432/parcelmoover_test
        run: npx prisma migrate deploy

      - name: Run server tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://parcelmoover:parcelmoover@localhost:5432/parcelmoover_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: ci-only-secret
        run: npm test

      - name: Install client deps & build
        working-directory: client
        run: |
          npm ci
          npm run build
          

      # Add after "Install client deps & build" step
      - name: Install rider deps & build
        working-directory: rider
        run: |
          npm ci
          npm run build

  # ── Stage 2: build the image HERE, not on the 1GB production box.
  # Building on the server OOM-killed it on 2026-07-16 and locked out SSH.
  # The server only ever pulls finished images from GHCR now. ──
  build:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        # GHCR requires a lowercase namespace; github.repository_owner is "Yunira0"
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/parcelmoover" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :<sha> is the tag actually deployed (and the rollback target);
          # :latest is a convenience alias for humans
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: ship to EC2 — pull the image, snapshot the DB, restart, verify ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production     # optional: add required reviewers in repo settings
    permissions:
      contents: read
      packages: read            # lets GITHUB_TOKEN pull the image on the server

    env:
      SSH_HOST: ${{ secrets.EC2_HOST }}          # 13.50.238.10
      APP_IMAGE: ${{ needs.build.outputs.image }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}          # dedicated deploy key, NOT the .pem
          SSH_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}  # optional pinned host key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            # pinned host key (get it once with: ssh-keyscan 13.50.238.10)
            echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            # fallback: trust-on-first-use every run — works, but pin it when you can
            ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Export clean tree (committed files only, like git archive)
        run: |
          mkdir -p /tmp/release
          git archive HEAD | tar -x -C /tmp/release

      - name: Rsync release to staging dir on host
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            /tmp/release/ \
            ubuntu@"$SSH_HOST":/var/www/parcelmoover-staging/

      - name: Pre-deploy safety net (DB snapshot + record rollback image)
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"$SSH_HOST" bash -s <<'EOF'
            set -euo pipefail
            APP_DIR=/var/www/express-app

            # Local pre-deploy dump — self-contained, no S3 required. This is
            # the restore point if the incoming deploy runs a bad migration.
            # Keeps the last 7; lives on the root volume, so it survives
            # container recreation but NOT instance loss — configure
            # BACKUP_S3_BUCKET + an instance role for real off-box backups.
            sudo mkdir -p /var/backups/parcelmoover
            if sudo docker ps --format '{{.Names}}' | grep -qx deploy-db-1; then
              sudo docker exec deploy-db-1 \
                sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
                | gzip | sudo tee "/var/backups/parcelmoover/pre-deploy-$(date -u +%Y%m%dT%H%M%SZ).sql.gz" >/dev/null
              sudo find /var/backups/parcelmoover -name 'pre-deploy-*.sql.gz' -mtime +7 -delete
            fi

            # Off-box S3 backup too, when configured
            if grep -q '^BACKUP_S3_BUCKET=' "$APP_DIR/deploy/.env.production" 2>/dev/null; then
              sudo "$APP_DIR/deploy/backup-db.sh"
            fi

            # Remember the exact image currently serving traffic — this is
            # what the rollback step re-deploys
            if sudo docker ps --format '{{.Names}}' | grep -qx deploy-app-1; then
              sudo docker inspect deploy-app-1 --format '{{.Config.Image}}' \
                | sudo tee "$APP_DIR/deploy/.last-good-image" >/dev/null
            fi
          EOF

      - name: Sync into live dir, pull image, restart stack
        id: deploy_stack
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"$SSH_HOST" \
            "APP_IMAGE='$APP_IMAGE' GHCR_USER='${{ github.actor }}' GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' bash -s" <<'EOF'
            set -euo pipefail
            APP_DIR=/var/www/express-app

            # --delete so files removed from the repo actually disappear from
            # the live tree; host-only files are explicitly preserved
            rsync -a --delete \
              --exclude='.git' \
              --exclude='deploy/.env.production' \
              --exclude='deploy/.env.production.*' \
              --exclude='deploy/.last-good-image' \
              /var/www/parcelmoover-staging/ "$APP_DIR"/

            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cd "$APP_DIR"
            sudo env APP_IMAGE="$APP_IMAGE" docker compose \
              -f deploy/docker-compose.prod.yml \
              --env-file deploy/.env.production \
              pull app

            sudo env APP_IMAGE="$APP_IMAGE" docker compose \
              -f deploy/docker-compose.prod.yml \
              --env-file deploy/.env.production \
              up -d

            # verify the data volume didn't get swapped (2026-07-14 incident)
            sudo docker inspect deploy-db-1 --format '{{range .Mounts}}{{.Name}}{{end}}' \
              | grep -q deploy_db-data || { echo "WRONG DB VOLUME MOUNTED"; exit 1; }

            # old images pile up fast on a 19GB disk — keep the rollback
            # target and current, prune the rest
            sudo docker image prune -f >/dev/null
          EOF

      - name: Health check (retry up to 60s)
        id: health
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"$SSH_HOST" bash -s <<'EOF'
            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then
                echo "==> Healthy after ~$(( i * 5 ))s"
                exit 0
              fi
              sleep 5
            done
            echo "!! App never became healthy — dumping last log lines:"
            sudo docker logs deploy-app-1 2>&1 | tail -30
            exit 1
          EOF

      # ── Automatic rollback: only fires if the restart or health check failed,
      # never for earlier failures (SSH setup, rsync) where nothing was touched ──
      - name: Rollback to last good image
        if: >-
          failure() &&
          (steps.deploy_stack.outcome == 'failure' || steps.health.outcome == 'failure')
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"$SSH_HOST" bash -s <<'EOF'
            set -euo pipefail
            APP_DIR=/var/www/express-app

            if [ ! -s "$APP_DIR/deploy/.last-good-image" ]; then
              echo "!! No recorded last-good image — cannot auto-rollback."
              echo "!! Restore manually: re-run the workflow from the last good"
              echo "!! commit, or restore the newest /var/backups/parcelmoover dump."
              exit 1
            fi

            LAST_GOOD="$(cat "$APP_DIR/deploy/.last-good-image")"
            echo "==> Rolling back app to $LAST_GOOD ..."

            cd "$APP_DIR"
            # force-recreate: image ref may be unchanged if the failure was
            # mid-deploy, so compose must be told to recreate regardless
            sudo env APP_IMAGE="$LAST_GOOD" docker compose \
              -f deploy/docker-compose.prod.yml \
              --env-file deploy/.env.production \
              up -d --force-recreate app

            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then
                echo "==> Rollback OK — $LAST_GOOD is serving again."
                echo "NOTE: code is rolled back, the DATABASE is not. If the failed"
                echo "deploy ran a bad migration, restore the newest pre-deploy dump"
                echo "from /var/backups/parcelmoover/."
                exit 0
              fi
              sleep 5
            done
            echo "!! Rollback image is up but never became healthy — manual intervention needed."
            exit 1
          EOF
